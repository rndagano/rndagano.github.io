# Welcome to Jekyll!
#
# This config file is meant for settings that affect your whole blog, values
# which you are expected to set up once and rarely edit after that. If you find
# yourself editing this file very often, consider using Jekyll's data files
# feature for the data you need to update frequently.
#
# For technical reasons, this file is *NOT* reloaded automatically when you use
# 'bundle exec jekyll serve'. If you change this file, please restart the server process.

# Site settings
# These are used to personalize your new site. If you look in the HTML files,
# you will see them accessed via {{ site.title }}, {{ site.email }}, and so on.
# You can create any custom variable you would like, and they will be accessible
# in the templates via {{ site.myvariable }}.
title: Ndagano's Projects
email: # left blank intentionally; contact via GitHub/Twitter
description: >- # this means to ignore newlines until "baseurl:"
  A place to hone your analytical skills.
baseurl: "" # user page (rndagano.github.io) is served at the domain root
url: "https://rndagano.github.io" # the base hostname & protocol for your site, e.g. http://example.com
projects_surl: "/projects"
twitter_username: rndagano
github_username:  rndagano
show_downloads: false

twitter:
  card: summary_large_image

# Default social-share image for jekyll-seo-tag (it reads page.image, so we
# set it via front matter defaults; override per post with `image:`).
defaults:
  - scope:
      path: ""
    values:
      image: /assets/images/portfolio-blog.png

# Build settings
markdown: kramdown
#theme: minima
theme: jekyll-theme-cayman
plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-sitemap

# Exclude from processing — keep dev/meta files out of the built _site.
exclude:
  - Gemfile
  - Gemfile.lock
  - Gemfile.lock.bak
  - CONTRIBUTING.md
  - README.md
  - .gitmessage
  - vendor/
  - node_modules/
