# Run the site locally with only Docker installed (no Ruby/DevKit on the host):
#
#   docker compose up        # build + serve at http://localhost:4000
#   docker compose down      # stop
#
# Gems are cached in the named "bundle" volume, so only the first run is slow.
services:
  jekyll:
    image: ruby:3.3
    working_dir: /site
    command: >
      bash -lc "bundle install &&
                bundle exec jekyll serve
                  --host 0.0.0.0
                  --livereload
                  --force_polling"
    ports:
      - "4000:4000"   # site
      - "35729:35729" # livereload
    volumes:
      - .:/site                  # live-mount the source for auto-rebuild
      - bundle:/usr/local/bundle # cache installed gems between runs
    environment:
      - JEKYLL_ENV=development

volumes:
  bundle:
